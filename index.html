<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>PhoneMash</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>📱 PhoneMash</h1>
<p>Comparación A/B para construir rankings de celulares</p>

<div class="grid">

<!-- PANEL 1 -->

<div class="card">

<h2>1) Configura</h2>

<label>Perfil</label>

<select>
<option>Usuarios Android</option>
<option>Usuarios iPhone</option>
<option>Gamers</option>
<option>Fotografía</option>
</select>

<br><br>

<button onclick="nuevoDuelo()">🔁 Nuevo duelo</button>
<button onclick="reiniciar()">🔴 Reiniciar</button>

</div>

<!-- PANEL 2 -->

<div class="card">

<h2>2) Vota</h2>

<p>¿Cuál celular recomiendas más?</p>

<div class="duelo">

<button id="optionA" class="phone"></button>

<button id="optionB" class="phone"></button>

</div>

</div>

<!-- PANEL 3 -->

<div class="card">

<h2>3) Ranking</h2>

<ol id="ranking"></ol>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
