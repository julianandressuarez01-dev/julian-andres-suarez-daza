<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TeamMash</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>⚽ TeamMash</h1>
<p>Comparación A/B para descubrir qué equipo es mejor</p>

<div class="container">

<div class="card">

<h2>1) Configura</h2>

<label>Perfil</label>

<select>
<option>Fans de fútbol</option>
<option>Liga Europea</option>
<option>Liga Latinoamericana</option>
</select>

<br><br>

<button onclick="nuevoDuelo()">🔁 Nuevo duelo</button>
<button onclick="reiniciar()">🔴 Reiniciar</button>

<p class="tip">Tip: usa "Nuevo duelo" si se repite una comparación</p>

</div>

<div class="card">

<h2>2) Vota</h2>

<p>¿Qué equipo es mejor?</p>

<div class="duelo">

<button id="equipoA" class="team"></button>

<span class="vs">VS</span>

<button id="equipoB" class="team"></button>

</div>

</div>

<div class="card">

<h2>3) Ranking (Top 10)</h2>

<ol id="ranking"></ol>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
